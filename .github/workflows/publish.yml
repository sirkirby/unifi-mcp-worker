name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set version from tag
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install CLI dependencies
        run: npm ci

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Run CLI tests
        run: npm test

      - name: Run worker tests
        run: npm run test:worker

      - name: Pack npm tarball
        run: npm pack

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: unifi-mcp-worker-*.tgz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-and-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: release-files

      - name: Generate release notes
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi

          cat > release-notes.md <<NOTES_EOF
          ## What's Changed

          ${COMMITS}

          ## Install

          \`\`\`bash
          npm install -g unifi-mcp-worker
          unifi-mcp-worker install
          \`\`\`

          ## Update

          \`\`\`bash
          unifi-mcp-worker upgrade
          \`\`\`
          NOTES_EOF

          sed -i 's/^          //' release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          name: v${{ needs.validate-tag.outputs.version }}
          body_path: release-notes.md
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npmjs.org
    runs-on: ubuntu-latest
    needs: [validate-tag, create-release]
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Set version from tag
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: npm ci
      - run: cd worker && npm ci

      - name: Publish package
        run: npm publish --provenance --access public

      - name: Publish summary
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          echo "## Published to npmjs.org" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "**Package:** [unifi-mcp-worker](https://www.npmjs.com/package/unifi-mcp-worker)" >> "$GITHUB_STEP_SUMMARY"

  sync-version:
    name: Sync version to main
    runs-on: ubuntu-latest
    needs: [validate-tag, publish]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Commit version bump
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: sync version to $VERSION [skip ci]"
          git push
